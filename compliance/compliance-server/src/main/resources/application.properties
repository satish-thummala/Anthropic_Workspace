# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/compliance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Generate a strong 256-bit secret key for production
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.access-token-expiry=900000
# 15 minutes in ms
app.jwt.refresh-token-expiry=604800000
# 7 days in ms

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.techcorp.compliance=DEBUG
logging.level.org.springframework.security=INFO

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/compliance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Generate a strong 256-bit secret key for production
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.access-token-expiry=900000
# 15 minutes in ms
app.jwt.refresh-token-expiry=604800000
# 7 days in ms

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.techcorp.compliance=DEBUG
logging.level.org.springframework.security=INFO

# ─── AI / Groq Configuration ──────────────────────────────────────────────────
# Step 1: Sign up free at https://console.groq.com (no credit card needed)
# Step 2: Create an API key → copy it below
# Step 3: Set ai.groq.enabled=true

ai.groq.enabled=false
ai.groq.api-key=
ai.groq.model=llama-3.3-70b-versatile

# ─── To activate Groq, replace the lines above with: ──────────────────────────
# ai.groq.enabled=true
# ai.groq.api-key=gsk_your_key_here
# ai.groq.model=llama-3.3-70b-versatile

# ============================================================================
# FILE STORAGE CONFIGURATION
# ============================================================================

# Storage Type: cloudinary or local
# Default: local
file.storage.type=cloudinary

# ============================================================================
# CLOUDINARY CONFIGURATION (when file.storage.type=cloudinary)
# ============================================================================
# Sign up at https://cloudinary.com (free tier: 25GB storage)
# Get credentials from: https://cloudinary.com/console

cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# ============================================================================
# LOCAL STORAGE CONFIGURATION (when file.storage.type=local)
# ============================================================================

# Base path for file storage (relative or absolute)
# Default: ./uploads
file.storage.local.base-path=./uploads

# Base URL for file access
# This is used to generate download URLs
# Default: http://localhost:8080/files
file.storage.local.base-url=http://localhost:8080/files

# ============================================================================
# MULTIPART FILE UPLOAD SETTINGS
# ============================================================================

# Max file size (default: 10MB)
spring.servlet.multipart.max-file-size=10MB

# Max request size (default: 10MB)
spring.servlet.multipart.max-request-size=10MB

# Enable multipart uploads
spring.servlet.multipart.enabled=true

# ============================================================================
# HOW TO SWITCH BETWEEN STORAGE TYPES
# ============================================================================

# For Development/Demo: Use Cloudinary (no setup needed, free tier)
# file.storage.type=cloudinary
# cloudinary.cloud-name=demo
# cloudinary.api-key=123456789012345
# cloudinary.api-secret=abcdefghijklmnopqrstuvwxyz12
# cloudinary.cloud-name=dnscaqdgt
# cloudinary.api-key=547617354954817
# cloudinary.api-secret=ePei6mQmXntkGFJmBuw1Tr5bpN8

# For Production: Use Local Storage (more secure, no external dependency)
# file.storage.type=local
# file.storage.local.base-path=./uploads
# file.storage.local.base-url=http://localhost:8080/files

# ============================================================================
# FILE SERVING (for local storage only)
# ============================================================================
# Spring Boot will serve files from the uploads directory
# Files will be accessible at: http://localhost:8080/files/{path}


